<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뽈로</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1b2a">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #0d1b2a;
    font-family: -apple-system, "Malgun Gothic", sans-serif;
    color: #ffffff;
  }

  .screens {
    position: fixed;
    inset: 0;
    height: 300vh;
    transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .screens.at-carousel { transform: translateY(-100vh); }
  .screens.at-menu { transform: translateY(-200vh); }

  .screen {
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* 화면 1: 문구/소개 */
  #screenQuote { flex-direction: column; padding: 0 32px; text-align: center; }
  .quote-text {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.6;
    max-width: 420px;
  }
  .quote-source {
    margin-top: 14px;
    font-size: 0.85rem;
    color: #8fa3b8;
  }
  .chevron-up {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.6rem;
    color: #4a5f75;
    animation: bounceUp 1.8s ease-in-out infinite;
    cursor: pointer;
    padding: 16px;
  }
  @keyframes bounceUp {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.4; }
    50% { transform: translate(-50%, -8px); opacity: 1; }
  }

  /* 화면 2: 로고 캐러셀 */
  #screenCarousel { flex-direction: column; overflow: hidden; }
  .chevron-down {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.4rem;
    color: #4a5f75;
    animation: bounceDown 1.8s ease-in-out infinite;
    cursor: pointer;
    padding: 16px;
    z-index: 5;
  }
  @keyframes bounceDown {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.4; }
    50% { transform: translate(-50%, 8px); opacity: 1; }
  }
  .logo-scroll {
    display: flex;
    width: 100%;
    padding: 0 15%;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    perspective: 900px;
    scrollbar-width: none;
    cursor: grab;
  }
  .logo-scroll::-webkit-scrollbar { display: none; }
  .logo-scroll.dragging { cursor: grabbing; scroll-snap-type: none; }
  .logo-item {
    flex: 0 0 70%;
    scroll-snap-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 14px;
  }
  /* 양끝 빈 로고: 보이지 않고, 스냅 정렬도 없어서 스크롤이 여기서 멈추지 못하고
     항상 실제 로고 쪽으로 되돌아감 (양끝 로고가 완전히 평면으로 펴지도록 여유 공간만 제공) */
  .logo-item.spacer {
    visibility: hidden;
    pointer-events: none;
    scroll-snap-align: none;
  }
  .logo-item .logo-box { width: 100%; }
  /* 사교원/트레이딩/글쓰기: 각 페이지에서 쓰는 것과 같은 460px 박스 */
  .logo-item.boxed .logo-box {
    max-width: 460px;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
  }
  .logo-item.boxed .logo-box img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }
  /* 스킴밐스: 투명 로고라 박스 없이 원래 페이지처럼 그대로(70%, 최대 322px) */
  .logo-item.plain .logo-box img {
    width: 70%;
    max-width: 322px;
    height: auto;
    margin: 0 auto;
  }
  .logo-item img {
    display: block;
    -webkit-user-drag: none;
    user-select: none;
  }

  /* 화면 3: 선택한 아이덴티티 메뉴 */
  #screenMenu { flex-direction: column; overflow-y: auto; padding: 90px 24px 40px; }
  .menu-inner { width: 100%; max-width: 460px; margin: 0 auto; }
  .menu-logo { width: 100%; margin-bottom: 1.2rem; }
  .menu-logo.boxed { max-width: 460px; margin-left: auto; margin-right: auto; border-radius: 16px; overflow: hidden; }
  .menu-logo.boxed img { width: 100%; height: 180px; object-fit: cover; display: block; }
  .menu-logo.plain img { width: 70%; max-width: 322px; height: auto; margin: 0 auto; display: block; }
  .menu-links { display: flex; flex-direction: column; gap: 12px; }
  .menu-link {
    display: block;
    text-align: center;
    padding: 14px 20px;
    background: #16324a;
    color: #ffffff;
    text-decoration: none;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(14px);
    animation: menuFadeIn 0.4s ease forwards;
    animation-delay: calc(var(--i) * 90ms);
  }
  @keyframes menuFadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* 홈버튼(설치) - 스킴밐스 로고, 설명 없음. 맨 아래 고정, 캐러셀/메뉴 화면에서 노출 */
  #installBtn {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    padding: 6px;
    cursor: pointer;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.12s ease, opacity 0.3s ease;
  }
  #installBtn.visible { opacity: 1; pointer-events: auto; }
  #installBtn:active { transform: translateX(-50%) scale(0.94); }
  #installBtn img { width: 64px; height: auto; display: block; }
  #installBtn .copyright {
    font-size: 0.6rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #8fa3b8;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="screens" id="screens">
    <div class="screen" id="screenQuote">
      <div>
        <p class="quote-text" id="quoteText"></p>
        <p class="quote-source" id="quoteSource"></p>
      </div>
      <div class="chevron-up" id="chevronUp">︿</div>
    </div>

    <div class="screen" id="screenCarousel">
      <div class="chevron-down" id="chevronDown">﹀</div>
      <div class="logo-scroll" id="logoScroll">
        <div class="logo-item spacer" aria-hidden="true"></div>
        <div class="logo-item plain" data-id="skimmmiks">
          <div class="logo-box"><img src="/skimmmiks/logo.png" alt=""></div>
        </div>
        <div class="logo-item boxed" data-id="writing">
          <div class="logo-box"><img src="/writing/logo.jpg" alt=""></div>
        </div>
        <div class="logo-item boxed" data-id="sakyowon">
          <div class="logo-box"><img src="/sakyowon/logo.jpg" alt=""></div>
        </div>
        <div class="logo-item boxed" data-id="trading">
          <div class="logo-box"><img src="/trading/logo.jpg" alt=""></div>
        </div>
        <div class="logo-item spacer" aria-hidden="true"></div>
      </div>
    </div>

    <div class="screen" id="screenMenu">
      <div class="chevron-down" id="chevronMenuDown">﹀</div>
      <div class="menu-inner">
        <div class="menu-logo" id="menuLogoBox"></div>
        <div class="menu-links" id="menuLinks"></div>
      </div>
    </div>
  </div>

  <button type="button" id="installBtn">
    <img src="/skimmmiks/logo.png" alt="">
    <span class="copyright">All copy rights reserved @SKIMMMIKS</span>
  </button>

<script>
  const QUOTES = [
    { text: "시작이 반이다.", source: "" },
    { text: "오늘 걷지 않으면 내일은 뛰어야 한다.", source: "" },
    { text: "작은 습관이 쌓여 방향이 된다.", source: "" },
    { text: "포기하지 않는 한 실패는 없다.", source: "" },
    { text: "지금 이 순간에 집중하라.", source: "" },
    { text: "완벽한 때는 없다, 지금이 그때다.", source: "" },
  ];
  const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  document.getElementById("quoteText").textContent = q.text;
  document.getElementById("quoteSource").textContent = q.source;

  const IDENTITIES = {
    skimmmiks: {
      logo: "/skimmmiks/logo.png",
      plain: true,
      links: [
        { label: "Q&A", href: "/skimmmiks/qa.html" },
        { label: "Lessons", href: "https://map.naver.com/p/entry/place/1613482741?placePath=%2Fhome%3Fentry%3Dplt&searchType=place&lng=128.6832774&lat=38.0540714&c=15.00,0,0,2,dh", external: true },
        { label: "Skim Jam", href: "/skimmmiks/jam.html" },
        { label: "Skim Session", href: "https://www.instagram.com/skimmmiks/", external: true },
      ],
    },
    writing: {
      logo: "/writing/logo.jpg",
      plain: false,
      links: [
        { label: "양양전설", href: "https://yangyang-legend.pages.dev", external: true },
        { label: "에세이", href: "/writing/essays.html" },
        { label: "일일일시", href: "/writing/poems.html" },
        { label: "습작의기억", href: "/writing/drafts.html" },
      ],
    },
    sakyowon: {
      logo: "/sakyowon/logo.jpg",
      plain: false,
      links: [
        { label: "오늘 업무 입력", href: "/sakyowon/daily-log.html" },
        { label: "주간보고서", href: "/sakyowon/reports.html" },
        { label: "투두리스트", href: "/sakyowon/todo.html" },
        { label: "내 위키", href: "https://sakyowon-wiki-2a5.pages.dev", external: true },
      ],
    },
    trading: {
      logo: "/trading/logo.jpg",
      plain: false,
      links: [
        { label: "오늘 트레이딩 입력", href: "/trading/log.html" },
        { label: "주간 리포트", href: "/trading/weekly.html" },
        { label: "투두리스트", href: "/trading/todo.html" },
        { label: "내 자산현황", href: "/trading/assets.html" },
        { label: "Billionaire Ambition", href: "/trading/ambition.html" },
      ],
    },
  };

  const screens = document.getElementById("screens");
  const logoScroll = document.getElementById("logoScroll");
  const logoItems = [...document.querySelectorAll(".logo-item")];
  const installBtn = document.getElementById("installBtn");
  const menuLogoBox = document.getElementById("menuLogoBox");
  const menuLinks = document.getElementById("menuLinks");

  // level: 0=문구, 1=캐러셀, 2=선택된 아이덴티티 메뉴
  let level = 0;
  let centeredId = null;

  function setLevel(n) {
    level = n;
    screens.classList.toggle("at-carousel", level === 1);
    screens.classList.toggle("at-menu", level === 2);
    installBtn.classList.toggle("visible", level >= 1);
  }

  function openMenu(id) {
    const data = IDENTITIES[id];
    if (!data) return;
    menuLogoBox.className = "menu-logo " + (data.plain ? "plain" : "boxed");
    menuLogoBox.innerHTML = `<img src="${data.logo}" alt="">`;
    menuLinks.innerHTML = data.links
      .map(
        (l, i) =>
          `<a class="menu-link" style="--i:${i}" href="${l.href}"${l.external ? ' target="_blank"' : ""}>${l.label}</a>`
      )
      .join("");
    setLevel(2);
  }

  document.getElementById("chevronUp").addEventListener("click", () => setLevel(1));
  document.getElementById("chevronDown").addEventListener("click", () => setLevel(0));
  document.getElementById("chevronMenuDown").addEventListener("click", () => setLevel(1));

  // 세로 스와이프: 문구 → 캐러셀 → (선택한 로고) 메뉴, 순서대로 한 단계씩 이동
  let startX = null;
  let startY = null;
  document.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener("touchend", (e) => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    startX = null;

    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 60) {
      if (dy < 0) {
        if (level === 0) setLevel(1);
        else if (level === 1 && centeredId) openMenu(centeredId);
      } else {
        if (level === 2) setLevel(1);
        else if (level === 1) setLevel(0);
      }
    }
  }, { passive: true });

  // 로고 캐러셀: 스크롤 위치에 따라 코버플로우처럼 회전/축소되는 효과
  function updateCoverflow() {
    const rect = logoScroll.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    let best = { id: null, dist: Infinity };
    logoItems.forEach((item) => {
      // 측정 전에 transform을 잠깐 초기화 - 회전된 상태 그대로 재면
      // bounding box가 찌그러져서(원근 축소) 중심 계산이 매번 어긋남(양끝 항목이 평면으로 안 펴지는 원인)
      item.style.transform = "none";
      const r = item.getBoundingClientRect();
      const itemCenter = r.left + r.width / 2;
      const dist = (itemCenter - centerX) / rect.width;
      const clamped = Math.max(-1, Math.min(1, dist));
      const rotateY = clamped * -45;
      const scale = 1 - Math.abs(clamped) * 0.3;
      const opacity = 1 - Math.abs(clamped) * 0.55;
      item.style.transform = `perspective(900px) rotateY(${rotateY}deg) scale(${scale})`;
      item.style.opacity = opacity;
      if (item.dataset.id && Math.abs(dist) < Math.abs(best.dist)) {
        best = { id: item.dataset.id, dist };
      }
    });
    centeredId = best.id;
  }
  logoScroll.addEventListener("scroll", updateCoverflow, { passive: true });

  // 로고 폭(70%)과 좌우 여백을 같은 기준(컨테이너 전체 폭)으로 JS에서 직접 계산
  // - CSS % 패딩만 쓰면 패딩이 "안쪽 콘텐츠 박스" 기준으로 계산돼서, 맨 앞/뒤 로고는
  //   중앙까지 스크롤이 물리적으로 닿지 않아(경계에 막혀) 완전히 평면으로 안 펴지는 문제가 있었음
  function layoutCoverflow() {
    const w = logoScroll.clientWidth;
    // PC처럼 화면이 넓을 때 폭의 70%를 그대로 쓰면 카드가 너무 커져서 옆 로고가 화면 밖으로 밀려남 - 상한선을 둠
    const itemW = Math.min(w * 0.7, 480);
    const pad = (w - itemW) / 2;
    logoScroll.style.paddingLeft = pad + "px";
    logoScroll.style.paddingRight = pad + "px";
    logoItems.forEach((item) => {
      item.style.flex = `0 0 ${itemW}px`;
    });
  }

  // 초기 위치: 사교원이 가운데. 아이템 실제 위치 기준으로 계산(폭 비율에 안 흔들리게)
  function centerOn(idx, smooth) {
    const item = logoItems[idx];
    const target = item.offsetLeft - (logoScroll.clientWidth - item.clientWidth) / 2;
    logoScroll.scrollTo({ left: target, behavior: smooth ? "smooth" : "instant" });
  }
  const initialIndex = logoItems.findIndex((it) => it.dataset.id === "sakyowon");
  window.addEventListener("resize", () => {
    layoutCoverflow();
    centerOn(initialIndex, false);
    updateCoverflow();
  });

  layoutCoverflow();
  centerOn(initialIndex, false);
  updateCoverflow();

  // PC 마우스 휠(세로 휠)을 가로 스크롤로 변환
  logoScroll.addEventListener("wheel", (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      logoScroll.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, { passive: false });

  // PC 마우스 드래그로 스크롤
  let dragging = false;
  let dragStartX = 0;
  let dragScrollStart = 0;
  let dragMoved = 0;
  let justDragged = false;

  logoScroll.addEventListener("mousedown", (e) => {
    dragging = true;
    dragMoved = 0;
    dragStartX = e.pageX;
    dragScrollStart = logoScroll.scrollLeft;
    logoScroll.classList.add("dragging");
  });
  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const dx = e.pageX - dragStartX;
    dragMoved = Math.abs(dx);
    logoScroll.scrollLeft = dragScrollStart - dx;
  });
  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    logoScroll.classList.remove("dragging");
    justDragged = dragMoved >= 6;
  });

  // 클릭(마우스)/탭(터치) 둘 다 여기서 처리 - 드래그 직후엔 무시.
  // 이미 가운데 있는(선택된) 로고를 누르면 메뉴가 펼쳐지고,
  // 옆에 살짝 보이는(아직 안 골라진) 로고를 누르면 스와이프하듯 그 로고를 가운데로 이동만 함
  logoScroll.addEventListener("click", (e) => {
    if (justDragged) {
      justDragged = false;
      e.preventDefault();
      return;
    }
    const item = e.target.closest(".logo-item");
    if (!item || !item.dataset.id) return;
    if (item.dataset.id === centeredId) {
      openMenu(item.dataset.id);
    } else {
      centerOn(logoItems.indexOf(item), true);
    }
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }

  let deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  installBtn.addEventListener("click", async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    } else if (window.matchMedia("(display-mode: standalone)").matches) {
      alert("이미 앱으로 설치되어 있습니다.");
    } else if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
      alert("아이폰에서는: 하단 공유 버튼(□↑) → \"홈 화면에 추가\"를 눌러주세요.");
    } else {
      alert("이 브라우저에서는 자동 설치를 지원하지 않아요. 브라우저 메뉴에서 \"앱 설치\" 또는 \"홈 화면에 추가\"를 찾아주세요.");
    }
  });
</script>
</body>
</html>
