<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뽈로</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1b2a">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #0d1b2a;
    font-family: -apple-system, "Malgun Gothic", sans-serif;
    color: #ffffff;
  }

  .screens {
    position: fixed;
    inset: 0;
    height: 200vh;
    transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .screens.at-carousel { transform: translateY(-100vh); }

  .screen {
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* 화면 1: 문구/소개 */
  #screenQuote { flex-direction: column; padding: 0 32px; text-align: center; }
  .quote-text {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.6;
    max-width: 420px;
  }
  .quote-source {
    margin-top: 14px;
    font-size: 0.85rem;
    color: #8fa3b8;
  }
  .chevron-up {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.6rem;
    color: #4a5f75;
    animation: bounceUp 1.8s ease-in-out infinite;
    cursor: pointer;
    padding: 16px;
  }
  @keyframes bounceUp {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.4; }
    50% { transform: translate(-50%, -8px); opacity: 1; }
  }

  /* 화면 2: 로고 캐러셀 */
  #screenCarousel { flex-direction: column; overflow: hidden; }
  .chevron-down {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.4rem;
    color: #4a5f75;
    animation: bounceDown 1.8s ease-in-out infinite;
    cursor: pointer;
    padding: 16px;
  }
  @keyframes bounceDown {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.4; }
    50% { transform: translate(-50%, 8px); opacity: 1; }
  }
  .logo-scroll {
    display: flex;
    width: 100%;
    padding: 0 15%;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    perspective: 900px;
    scrollbar-width: none;
    cursor: grab;
  }
  .logo-scroll::-webkit-scrollbar { display: none; }
  .logo-scroll.dragging { cursor: grabbing; scroll-snap-type: none; }
  .logo-item {
    flex: 0 0 70%;
    scroll-snap-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 14px;
  }
  .logo-item a {
    display: block;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    text-decoration: none;
    pointer-events: none;
  }
  .logo-item img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    -webkit-user-drag: none;
    user-select: none;
  }
  .logo-name {
    margin-top: 14px;
    text-align: center;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 0.95rem;
  }

  /* 홈버튼(설치) - 화분, 설명 없음. 캐러셀 화면에서만 노출 */
  #installBtn {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #0d1b2a;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.12s ease, opacity 0.3s ease;
  }
  #installBtn.visible { opacity: 1; pointer-events: auto; }
  #installBtn:active { transform: translateX(-50%) scale(0.9); }
  #installBtn img { width: 34px; height: 34px; object-fit: contain; }
</style>
</head>
<body>
  <div class="screens" id="screens">
    <div class="screen" id="screenQuote">
      <div>
        <p class="quote-text" id="quoteText"></p>
        <p class="quote-source" id="quoteSource"></p>
      </div>
      <div class="chevron-up" id="chevronUp">︿</div>
    </div>

    <div class="screen" id="screenCarousel">
      <div class="chevron-down" id="chevronDown">﹀</div>
      <div class="logo-scroll" id="logoScroll">
        <div class="logo-item" data-href="/skimmmiks/index.html">
          <a href="/skimmmiks/index.html" tabindex="-1"><img src="/skimmmiks/logo.png"></a>
          <div class="logo-name">스킴밐스</div>
        </div>
        <div class="logo-item" data-href="/writing/index.html">
          <a href="/writing/index.html" tabindex="-1"><img src="/writing/logo.jpg"></a>
          <div class="logo-name">글쓰기</div>
        </div>
        <div class="logo-item" data-href="/sakyowon/index.html">
          <a href="/sakyowon/index.html" tabindex="-1"><img src="/sakyowon/logo.jpg"></a>
          <div class="logo-name">사교원</div>
        </div>
        <div class="logo-item" data-href="/trading/index.html">
          <a href="/trading/index.html" tabindex="-1"><img src="/trading/logo.jpg"></a>
          <div class="logo-name">트레이딩</div>
        </div>
      </div>
    </div>
  </div>

  <button type="button" id="installBtn"><img src="/flowerpot.png" alt=""></button>

<script>
  const QUOTES = [
    { text: "시작이 반이다.", source: "" },
    { text: "오늘 걷지 않으면 내일은 뛰어야 한다.", source: "" },
    { text: "작은 습관이 쌓여 방향이 된다.", source: "" },
    { text: "포기하지 않는 한 실패는 없다.", source: "" },
    { text: "지금 이 순간에 집중하라.", source: "" },
    { text: "완벽한 때는 없다, 지금이 그때다.", source: "" },
  ];
  const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  document.getElementById("quoteText").textContent = q.text;
  document.getElementById("quoteSource").textContent = q.source;

  const screens = document.getElementById("screens");
  const logoScroll = document.getElementById("logoScroll");
  const logoItems = [...document.querySelectorAll(".logo-item")];
  let atCarousel = false;

  const installBtn = document.getElementById("installBtn");

  function goToCarousel(show) {
    atCarousel = show;
    screens.classList.toggle("at-carousel", show);
    installBtn.classList.toggle("visible", show);
  }

  document.getElementById("chevronUp").addEventListener("click", () => goToCarousel(true));
  document.getElementById("chevronDown").addEventListener("click", () => goToCarousel(false));

  // 세로 스와이프: 문구 화면 <-> 캐러셀 화면 전환 (터치 전용, 가로 스크롤은 브라우저 네이티브 스크롤이 처리)
  let startX = null;
  let startY = null;
  document.addEventListener("touchstart", (e) => {
    if (e.target.closest("#logoScroll")) { startX = null; return; }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener("touchend", (e) => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    startX = null;

    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 60) {
      if (!atCarousel && dy < 0) goToCarousel(true);
      else if (atCarousel && dy > 0) goToCarousel(false);
    }
  }, { passive: true });

  // 로고 캐러셀: 스크롤 위치에 따라 코버플로우처럼 회전/축소되는 효과
  function updateCoverflow() {
    const rect = logoScroll.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    logoItems.forEach((item) => {
      const r = item.getBoundingClientRect();
      const itemCenter = r.left + r.width / 2;
      const dist = (itemCenter - centerX) / rect.width;
      const clamped = Math.max(-1, Math.min(1, dist));
      const rotateY = clamped * -45;
      const scale = 1 - Math.abs(clamped) * 0.3;
      const opacity = 1 - Math.abs(clamped) * 0.55;
      item.style.transform = `perspective(900px) rotateY(${rotateY}deg) scale(${scale})`;
      item.style.opacity = opacity;
    });
  }
  logoScroll.addEventListener("scroll", updateCoverflow, { passive: true });
  window.addEventListener("resize", () => {
    logoScroll.scrollLeft = 2 * logoScroll.clientWidth;
    updateCoverflow();
  });

  // 초기 위치: 사교원(인덱스 2)이 가운데
  logoScroll.scrollLeft = 2 * logoScroll.clientWidth;
  updateCoverflow();

  // PC 마우스 휠(세로 휠)을 가로 스크롤로 변환
  logoScroll.addEventListener("wheel", (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      logoScroll.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, { passive: false });

  // PC 마우스 드래그로 스크롤
  let dragging = false;
  let dragStartX = 0;
  let dragScrollStart = 0;
  let dragMoved = 0;
  let justDragged = false;

  logoScroll.addEventListener("mousedown", (e) => {
    dragging = true;
    dragMoved = 0;
    dragStartX = e.pageX;
    dragScrollStart = logoScroll.scrollLeft;
    logoScroll.classList.add("dragging");
  });
  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const dx = e.pageX - dragStartX;
    dragMoved = Math.abs(dx);
    logoScroll.scrollLeft = dragScrollStart - dx;
  });
  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    logoScroll.classList.remove("dragging");
    justDragged = dragMoved >= 6;
  });

  // 클릭(마우스)/탭(터치) 둘 다 여기서 처리 - 드래그 직후엔 무시
  logoScroll.addEventListener("click", (e) => {
    if (justDragged) {
      justDragged = false;
      e.preventDefault();
      return;
    }
    const item = e.target.closest(".logo-item");
    if (item) location.href = item.dataset.href;
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }

  let deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  installBtn.addEventListener("click", async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    } else if (window.matchMedia("(display-mode: standalone)").matches) {
      alert("이미 앱으로 설치되어 있습니다.");
    } else if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
      alert("아이폰에서는: 하단 공유 버튼(□↑) → \"홈 화면에 추가\"를 눌러주세요.");
    } else {
      alert("이 브라우저에서는 자동 설치를 지원하지 않아요. 브라우저 메뉴에서 \"앱 설치\" 또는 \"홈 화면에 추가\"를 찾아주세요.");
    }
  });
</script>
</body>
</html>
