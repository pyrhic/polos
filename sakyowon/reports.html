<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주간보고서 — 사교원</title>
<link rel="stylesheet" href="/sakyowon/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1b2a">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
  <div class="wrap">
    <a class="back" href="/sakyowon/index.html">← 돌아가기</a>
    <h1 style="font-size:1.4rem;margin-bottom:0.6rem;">주간보고서 히스토리</h1>
    <button id="genBtn" type="button" style="margin-bottom:6px;">이번 주 주간보고서 생성하기</button>
    <div class="msg" id="genMsg"></div>
    <div id="list" style="margin-top:20px;"><div class="empty">불러오는 중...</div></div>
    <div style="text-align:center;margin-top:28px;">
      <img src="/sakyowon/flowerpot.png" alt="" id="pot" style="width:80px;cursor:pointer;">
    </div>
  </div>

<script>
  document.getElementById("pot").addEventListener("click", () => {
    const pw = prompt("암호를 입력하세요");
    if (pw === "0130") {
      sessionStorage.setItem("warehousePw", pw);
      location.href = "warehouse.html";
    } else if (pw !== null) {
      alert("틀렸습니다.");
    }
  });
</script>

<script>
  const SUPABASE_URL = "https://oenqrlgmnkpzxsavnfyo.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_sZ4wQgaC5f-i40pVzf0vIA_R7iJWDf5";

  let reportsData = [];

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }

  function renderView(row, idx) {
    const d = row.report_data;
    if (!d) return "";
    const days = (d.days || [])
      .map(
        (day) =>
          `<div class="day"><span class="dow">${escapeHtml(day.date)}(${escapeHtml(day.dow)})</span>${(day.tasks || [])
            .map(escapeHtml)
            .join(", ")}${day.leave ? `<span class="leave">${escapeHtml(day.leave)}</span>` : ""}${
            day.inferred ? `<span class="leave">AI추정</span>` : ""
          }</div>`
      )
      .join("");
    return `<div class="report" data-idx="${idx}">
      <div class="period">${escapeHtml(d.periodStart)} ~ ${escapeHtml(d.periodEnd)}</div>
      ${days}
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button type="button" class="edit-btn" data-idx="${idx}" style="width:auto;padding:6px 12px;font-size:0.8rem;">수정</button>
        <a href="sakyowon-hwp://generate?date=${encodeURIComponent(row.report_date)}" class="link-btn hwp-btn" style="width:auto;padding:6px 12px;font-size:0.8rem;">.hwp</a>
      </div>
    </div>`;
  }

  const DOW_NAMES = ["일", "월", "화", "수", "목", "금", "토"];

  function parseKoreanDate(str) {
    const m = String(str || "").match(/(\d+)년\s*(\d+)월\s*(\d+)일/);
    if (!m) return null;
    return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  }

  function buildWeekSlots(d) {
    const start = parseKoreanDate(d.periodStart);
    const slots = [];
    for (let i = 0; i < 5; i++) {
      let dateStr, dow;
      if (start) {
        const dt = new Date(start);
        dt.setDate(dt.getDate() + i);
        dateStr = `${dt.getMonth() + 1}/${dt.getDate()}`;
        dow = DOW_NAMES[dt.getDay()];
      } else {
        const existing = (d.days || [])[i] || {};
        dateStr = existing.date || "";
        dow = existing.dow || "";
      }
      const existing = (d.days || []).find((day) => day.date === dateStr) || {};
      slots.push({
        date: dateStr,
        dow,
        tasks: existing.tasks || [],
        leave: existing.leave || "",
        inferred: existing.inferred || false,
      });
    }
    return slots;
  }

  function renderEdit(row, idx) {
    const d = row.report_data;
    const slots = buildWeekSlots(d);
    const days = slots
      .map(
        (day, di) => `
      <div style="margin-top:14px;font-weight:700;">${escapeHtml(day.date)}(${escapeHtml(day.dow)})${day.inferred ? ' <span style="font-weight:400;color:#e8362a;">— AI 추정, 확인 필요</span>' : ""}</div>
      <label>업무</label>
      <textarea data-day="${di}" data-date="${escapeHtml(day.date)}" data-dow="${escapeHtml(day.dow)}" data-field="tasks" style="min-height:70px;">${escapeHtml((day.tasks || []).join("\n"))}</textarea>
      <label>근무시간</label>
      <input data-day="${di}" data-date="${escapeHtml(day.date)}" data-dow="${escapeHtml(day.dow)}" data-field="leave" value="${escapeHtml(day.leave || "")}">
    `
      )
      .join("");
    return `<div class="report" data-idx="${idx}">
      <div class="period">${escapeHtml(d.periodStart)} ~ ${escapeHtml(d.periodEnd)}</div>
      ${days}
      <label>비고 (한 줄에 하나씩)</label>
      <textarea data-field="remarks" style="min-height:60px;">${escapeHtml((d.remarks || []).join("\n"))}</textarea>
      <div class="msg" style="margin-top:10px;"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button type="button" class="save-btn" data-idx="${idx}" style="width:auto;padding:6px 12px;font-size:0.8rem;">저장</button>
        <button type="button" class="cancel-btn" data-idx="${idx}" style="width:auto;padding:6px 12px;font-size:0.8rem;">취소</button>
      </div>
    </div>`;
  }

  function renderList() {
    const list = document.getElementById("list");
    if (!reportsData.length) {
      list.innerHTML = '<div class="empty">아직 저장된 주간보고서가 없습니다.</div>';
      return;
    }
    list.innerHTML = reportsData.map((row, idx) => renderView(row, idx)).join("");
  }

  async function loadReports() {
    const list = document.getElementById("list");
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/weekly_reports?select=id,report_date,report_data&archived=eq.false&order=report_date.desc`,
        {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
        }
      );
      reportsData = await res.json();
      renderList();
    } catch (err) {
      list.innerHTML = '<div class="empty">불러오기 실패: ' + err.message + "</div>";
    }
  }

  document.getElementById("list").addEventListener("click", async (e) => {
    const idx = e.target.dataset.idx;
    if (idx === undefined) return;
    const row = reportsData[idx];

    if (e.target.classList.contains("edit-btn")) {
      document.querySelector(`.report[data-idx="${idx}"]`).outerHTML = renderEdit(row, idx);
    } else if (e.target.classList.contains("cancel-btn")) {
      document.querySelector(`.report[data-idx="${idx}"]`).outerHTML = renderView(row, idx);
    } else if (e.target.classList.contains("save-btn")) {
      const card = document.querySelector(`.report[data-idx="${idx}"]`);
      const msg = card.querySelector(".msg");
      const d = JSON.parse(JSON.stringify(row.report_data));
      const slotsMap = {};
      card.querySelectorAll("[data-day]").forEach((el) => {
        const di = Number(el.dataset.day);
        if (!slotsMap[di]) slotsMap[di] = { date: el.dataset.date, dow: el.dataset.dow, tasks: [], leave: "" };
        if (el.dataset.field === "tasks") {
          slotsMap[di].tasks = el.value.split("\n").map((s) => s.trim()).filter(Boolean);
        } else if (el.dataset.field === "leave") {
          slotsMap[di].leave = el.value.trim();
        }
      });
      d.days = Object.keys(slotsMap)
        .map(Number)
        .sort((a, b) => a - b)
        .map((i) => slotsMap[i])
        .filter((day) => day.tasks.length > 0 || day.leave);
      const remarksEl = card.querySelector('[data-field="remarks"]');
      d.remarks = remarksEl.value.split("\n").map((s) => s.trim()).filter(Boolean);

      e.target.disabled = true;
      e.target.textContent = "저장 중...";
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_reports?id=eq.${row.id}`, {
          method: "PATCH",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json",
            Prefer: "return=minimum",
          },
          body: JSON.stringify({ report_data: d }),
        });
        if (!res.ok) throw new Error(await res.text());
        row.report_data = d;
        card.outerHTML = renderView(row, idx);
      } catch (err) {
        msg.className = "msg err";
        msg.textContent = "저장 실패: " + err.message;
        e.target.disabled = false;
        e.target.textContent = "저장";
      }
    }
  });

  loadReports();

  document.getElementById("genBtn").addEventListener("click", async () => {
    const btn = document.getElementById("genBtn");
    const msg = document.getElementById("genMsg");
    btn.disabled = true;
    btn.textContent = "생성 중...";
    msg.className = "msg";
    try {
      const res = await fetch("/api/generate-weekly-report", { method: "POST" });
      const data = await res.json();
      if (res.ok && data.success) {
        msg.className = "msg ok";
        msg.textContent = data.updated ? "이번 주 보고서를 최신 내용으로 갱신했습니다." : "이번 주 보고서가 생성됐습니다.";
        loadReports();
      } else {
        msg.className = "msg err";
        msg.textContent = "실패: " + (data.error || "알 수 없는 오류");
      }
    } catch (err) {
      msg.className = "msg err";
      msg.textContent = "실패: " + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "이번 주 주간보고서 생성하기";
    }
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }
</script>
</body>
</html>
