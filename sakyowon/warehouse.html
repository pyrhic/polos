<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>창고 — 사교원</title>
<link rel="stylesheet" href="/sakyowon/style.css">
</head>
<body>
  <div class="wrap">
    <a class="back" href="/sakyowon/reports.html">← 돌아가기</a>
    <h1 style="font-size:1.4rem;margin-bottom:1.2rem;">창고 (전체 기록)</h1>

    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <button id="del50" style="margin-top:0;">이전자료 50% 삭제</button>
      <button id="del100" style="margin-top:0;">이전자료 100% 삭제</button>
    </div>
    <div class="msg" id="msg"></div>

    <div id="list"><div class="empty">불러오는 중...</div></div>
  </div>

<script>
  const SUPABASE_URL = "https://oenqrlgmnkpzxsavnfyo.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_sZ4wQgaC5f-i40pVzf0vIA_R7iJWDf5";

  const pw = sessionStorage.getItem("warehousePw");
  if (pw !== "0130") {
    location.href = "reports.html";
  }

  async function loadAll() {
    const list = document.getElementById("list");
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/weekly_reports?select=id,report_date,archived,report_data&order=id.desc`,
        {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
        }
      );
      const rows = await res.json();

      if (!rows.length) {
        list.innerHTML = '<div class="empty">저장된 기록이 없습니다.</div>';
        return;
      }

      list.innerHTML = rows
        .map((row) => {
          const d = row.report_data || {};
          const days = (d.days || [])
            .map((day) => `<div class="day"><span class="dow">${day.date}(${day.dow})</span>${(day.tasks || []).join(", ")}</div>`)
            .join("");
          return `<div class="report">
            <div class="period">#${row.id} · ${row.report_date} ${row.archived ? "<span class='leave'>숨김</span>" : ""}</div>
            ${days}
          </div>`;
        })
        .join("");
    } catch (err) {
      list.innerHTML = '<div class="empty">불러오기 실패: ' + err.message + "</div>";
    }
  }

  async function runCleanup(action, label) {
    const msg = document.getElementById("msg");
    if (!confirm(`정말로 "${label}"를 실행할까요? 되돌릴 수 없습니다.`)) return;
    msg.className = "msg";
    msg.textContent = "처리 중...";
    try {
      const res = await fetch("/api/manage-storage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw, action }),
      });
      const data = await res.json();
      if (res.ok && data.success) {
        msg.className = "msg ok";
        msg.textContent = `완료: ${data.deleted}건 삭제됨`;
        loadAll();
      } else {
        msg.className = "msg err";
        msg.textContent = "실패: " + (data.error || "알 수 없는 오류");
      }
    } catch (err) {
      msg.className = "msg err";
      msg.textContent = "실패: " + err.message;
    }
  }

  document.getElementById("del50").addEventListener("click", () => runCleanup("delete50", "이전자료 50% 삭제"));
  document.getElementById("del100").addEventListener("click", () => runCleanup("delete100", "이전자료 100% 삭제"));

  loadAll();
</script>
</body>
</html>
