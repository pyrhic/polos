<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주간 리포트 — 트레이딩</title>
<link rel="stylesheet" href="/trading/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f3d33">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  .stat-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .stat-tile {
    flex: 1;
    background: #ffffff;
    border: none;
    border-radius: 3px;
    padding: 12px 10px;
    text-align: center;
  }
  .stat-tile .label { font-size: 0.75rem; color: #3a6659; margin-bottom: 4px; }
  .stat-tile .value { font-size: 1.05rem; font-weight: 800; }
  .chart-wrap { background: #ffffff; border: none; border-radius: 3px; padding: 14px; margin-bottom: 18px; }
  .chart-wrap h3 { margin: 0 0 10px; font-size: 0.95rem; }
  .bar-tooltip {
    position: absolute;
    background: #0f3d33;
    color: #fff;
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
    transform: translate(-50%, -130%);
    display: none;
  }
  .insights { white-space: pre-line; font-size: 0.9rem; margin-top: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/trading/index.html">← 트레이딩 허브</a>
    <h1 style="font-size:1.4rem;margin-bottom:0.6rem;">주간 리포트</h1>
    <button id="genBtn" type="button" style="margin-bottom:6px;">이번 주 리포트 생성/갱신</button>
    <div class="msg" id="genMsg"></div>

    <div class="stat-row" id="statRow"></div>

    <div class="chart-wrap">
      <h3>주간 수익률 (%)</h3>
      <div style="position:relative;">
        <svg id="returnChart" viewBox="0 0 400 140" style="width:100%;height:140px;display:block;"></svg>
        <div class="bar-tooltip" id="barTooltip"></div>
      </div>
    </div>

    <div id="list"><div class="empty">불러오는 중...</div></div>
  </div>

<script>
  const SUPABASE_URL = "https://oenqrlgmnkpzxsavnfyo.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_sZ4wQgaC5f-i40pVzf0vIA_R7iJWDf5";
  const headers = { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` };
  const fmtWon = (n) => (n === null || n === undefined ? "-" : Math.round(n).toLocaleString() + "원");

  function renderStats(latest) {
    const row = document.getElementById("statRow");
    if (!latest) { row.innerHTML = ""; return; }
    const d = latest.report_data;
    row.innerHTML = `
      <div class="stat-tile"><div class="label">현재 총자산</div><div class="value">${fmtWon(d.currentAssets)}</div></div>
      <div class="stat-tile"><div class="label">필요 일일수익</div><div class="value">${fmtWon(d.requiredDailyProfit)}</div></div>
      <div class="stat-tile"><div class="label">남은 일수</div><div class="value">${d.remainingDays}일</div></div>
    `;
  }

  function renderChart(rows) {
    const svg = document.getElementById("returnChart");
    const tooltip = document.getElementById("barTooltip");
    const points = rows
      .map((r) => ({ label: r.report_data.periodEnd, pct: r.report_data.weeklyReturnPct }))
      .filter((p) => p.pct !== null && p.pct !== undefined)
      .slice(-12);

    if (!points.length) {
      svg.innerHTML = '<text x="200" y="70" text-anchor="middle" fill="#3a6659" font-size="12">아직 수익률 데이터가 없습니다 (2주 이상 쌓이면 표시됩니다)</text>';
      return;
    }

    const w = 400, h = 140, padL = 30, padR = 10, padT = 10, padB = 20;
    const maxAbs = Math.max(1, ...points.map((p) => Math.abs(p.pct)));
    const baseline = padT + (h - padT - padB) / 2;
    const scale = (h - padT - padB) / 2 / maxAbs;
    const bw = (w - padL - padR) / points.length;

    let svgHtml = `<line x1="${padL}" y1="${baseline}" x2="${w - padR}" y2="${baseline}" stroke="#d9e5e1" stroke-width="1"/>`;
    points.forEach((p, i) => {
      const x = padL + i * bw + bw * 0.2;
      const barW = bw * 0.6;
      const barH = Math.abs(p.pct) * scale;
      const y = p.pct >= 0 ? baseline - barH : baseline;
      const color = p.pct >= 0 ? "#1a7a34" : "#b3251a";
      svgHtml += `<rect x="${x}" y="${y}" width="${barW}" height="${Math.max(barH, 2)}" rx="2" fill="${color}"
        data-label="${p.label}" data-pct="${p.pct.toFixed(2)}" class="bar"/>`;
    });
    svg.innerHTML = svgHtml;

    svg.querySelectorAll(".bar").forEach((bar) => {
      bar.addEventListener("mouseenter", (e) => {
        const rect = svg.getBoundingClientRect();
        const bx = bar.getBoundingClientRect();
        tooltip.style.display = "block";
        tooltip.style.left = (bx.left - rect.left + bx.width / 2) + "px";
        tooltip.style.top = (bx.top - rect.top) + "px";
        tooltip.textContent = `${bar.dataset.label}: ${bar.dataset.pct}%`;
      });
      bar.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
    });
  }

  function renderList(rows) {
    const list = document.getElementById("list");
    if (!rows.length) {
      list.innerHTML = '<div class="empty">아직 생성된 주간 리포트가 없습니다.</div>';
      return;
    }
    list.innerHTML = rows
      .slice()
      .reverse()
      .map((row) => {
        const d = row.report_data;
        const pctText = d.weeklyReturnPct === null || d.weeklyReturnPct === undefined
          ? "-"
          : `${d.weeklyReturnPct >= 0 ? "+" : ""}${d.weeklyReturnPct.toFixed(2)}%`;
        return `<div class="report">
          <div class="period">${d.periodStart} ~ ${d.periodEnd}</div>
          <div class="day">총자산 ${fmtWon(d.currentAssets)} <span class="leave">${pctText}</span></div>
          ${d.insights ? `<div class="insights">${d.insights}</div>` : ""}
        </div>`;
      })
      .join("");
  }

  async function loadReports() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/trading_weekly_reports?select=report_data&archived=eq.false&order=report_date.asc`,
        { headers }
      );
      const rows = await res.json();
      renderStats(rows[rows.length - 1]);
      renderChart(rows);
      renderList(rows);
    } catch (err) {
      document.getElementById("list").innerHTML = '<div class="empty">불러오기 실패: ' + err.message + "</div>";
    }
  }

  document.getElementById("genBtn").addEventListener("click", async () => {
    const btn = document.getElementById("genBtn");
    const msg = document.getElementById("genMsg");
    btn.disabled = true;
    btn.textContent = "생성 중...";
    msg.className = "msg";
    try {
      const res = await fetch("/api/generate-trading-weekly-report", { method: "POST" });
      const data = await res.json();
      if (res.ok && data.success) {
        msg.className = "msg ok";
        msg.textContent = data.updated ? "이번 주 리포트를 최신 내용으로 갱신했습니다." : "이번 주 리포트가 생성됐습니다.";
        loadReports();
      } else {
        msg.className = "msg err";
        msg.textContent = "실패: " + (data.error || "알 수 없는 오류");
      }
    } catch (err) {
      msg.className = "msg err";
      msg.textContent = "실패: " + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "이번 주 리포트 생성/갱신";
    }
  });

  loadReports();

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }
</script>
</body>
</html>
